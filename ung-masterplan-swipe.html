<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNG Dahlonega Campus Vision Plan</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet"/>
<style>
  :root {
    --navy:      #0a2240;
    --navy-mid:  #0d2d54;
    --gold:      #c9a84c;
    --gold-light:#e8d49a;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:'Lato',sans-serif; font-weight:300;
    background:var(--navy); color:#fff;
    height:100vh; display:flex; flex-direction:column; overflow:hidden;
  }
  header {
    background:var(--navy); border-bottom:2px solid var(--gold);
    padding:0 24px; height:60px; display:flex;
    align-items:center; justify-content:space-between;
    flex-shrink:0; z-index:1000;
  }
  .header-left { display:flex; align-items:center; gap:14px; }
  .wordmark {
    font-family:'Cormorant Garamond',serif; font-size:13px;
    font-weight:600; letter-spacing:.12em; text-transform:uppercase;
    color:var(--gold-light); line-height:1.3;
  }
  .wordmark span {
    display:block; font-size:10px; font-weight:400;
    letter-spacing:.18em; color:var(--gold); opacity:.85;
  }
  .dvdr { width:1px; height:32px; background:var(--gold); opacity:.4; }
  .map-title {
    font-family:'Cormorant Garamond',serif; font-size:17px;
    font-weight:400; font-style:italic; color:#fff; letter-spacing:.02em;
  }
  .badge {
    background:var(--gold); color:var(--navy);
    font-size:10px; font-weight:700; letter-spacing:.12em;
    text-transform:uppercase; padding:3px 10px; border-radius:2px;
  }
  .toggle-bar {
    display:flex; height:40px; flex-shrink:0;
    background:var(--navy-mid);
    border-bottom:1px solid rgba(201,168,76,.25);
    align-items:center; justify-content:center; gap:0; z-index:900;
  }
  .toggle-label {
    font-size:10px; font-weight:400; letter-spacing:.12em;
    text-transform:uppercase; color:rgba(201,168,76,.6);
    padding-right:16px; white-space:nowrap; font-style:italic;
  }
  .toggle-btn {
    height:28px; padding:0 32px;
    font-family:'Lato',sans-serif; font-size:10px;
    font-weight:700; letter-spacing:.18em; text-transform:uppercase;
    border:1px solid rgba(201,168,76,.35); cursor:pointer;
    transition:all .2s ease; display:flex; align-items:center; gap:8px;
    background:rgba(255,255,255,.05); color:#9ab0c8;
  }
  .toggle-btn:first-of-type { border-radius:3px 0 0 3px; }
  .toggle-btn:last-of-type  { border-radius:0 3px 3px 0; border-left:none; }
  .toggle-btn.active {
    background:var(--navy); color:var(--gold);
    border-color:var(--gold);
    box-shadow:0 0 10px rgba(201,168,76,.25);
  }
  .toggle-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  #viewLabel {
    position:absolute; top:50%; left:50%;
    transform:translate(-50%,-50%);
    font-family:'Cormorant Garamond',serif;
    font-size:24px; font-style:italic;
    color:rgba(255,255,255,.9);
    background:rgba(10,34,64,.78);
    padding:12px 32px; border-radius:4px;
    border:1px solid rgba(201,168,76,.5);
    pointer-events:none; opacity:0;
    transition:opacity .25s ease;
    z-index:800; white-space:nowrap;
    backdrop-filter:blur(4px);
  }
  #viewLabel.show { opacity:1; }
  #map { flex:1; width:100%; position:relative; }
  .legend {
    background:rgba(10,34,64,.93);
    border:1px solid rgba(201,168,76,.4);
    border-radius:4px; padding:12px 16px; min-width:210px;
    backdrop-filter:blur(4px);
  }
  .legend h4 {
    font-family:'Cormorant Garamond',serif; font-size:13px; font-weight:600;
    letter-spacing:.1em; text-transform:uppercase; color:var(--gold);
    margin-bottom:10px; padding-bottom:6px;
    border-bottom:1px solid rgba(201,168,76,.3);
  }
  .li { display:flex; align-items:center; gap:9px; margin-bottom:6px; font-size:11px; font-weight:300; color:#d0dce8; letter-spacing:.03em; }
  .sw { width:16px; height:12px; border-radius:2px; flex-shrink:0; }
  .ln { margin-top:10px; padding-top:8px; border-top:1px solid rgba(201,168,76,.2); font-size:9.5px; color:rgba(201,168,76,.7); font-style:italic; line-height:1.5; }
  .leaflet-control-attribution { background:rgba(10,34,64,.75)!important; color:rgba(255,255,255,.5)!important; font-size:9px!important; }
  .leaflet-control-attribution a { color:rgba(201,168,76,.8)!important; }
  .leaflet-control-zoom a { background:rgba(10,34,64,.9)!important; color:var(--gold)!important; border-color:rgba(201,168,76,.3)!important; }
</style>
</head>

  <button class="toggle-btn" id="btnVision" onclick="showVision()">

  </button>
</div>

const map = L.map('map', { center:[34.5295, -83.9868], zoom:16 });

const osmLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution:'© <a href="https://openstreetmap.org">OpenStreetMap</a> contributors | John Segars, UNG Facilities GIS',
  maxZoom:20,
  className:'osm-tiles'
}).addTo(map);

// ── Color scheme ──────────────────────────────────────────────────────────────
function getStyle(feature, mode) {
  const status = (feature.properties.STATUS || '').toLowerCase();
  const cat    = (feature.properties.CATEGORY || '').toLowerCase();

  if (mode === 'existing') {
    // All shown as existing — grey/neutral
    if (cat.includes('housing'))    return { fillColor:'#6a8fb5', color:'#3a5f85', weight:1.5, fillOpacity:.72 };
    if (cat.includes('athletic') || cat.includes('recreation')) return { fillColor:'#7a9e6a', color:'#4a6e3a', weight:1.5, fillOpacity:.65 };
    if (cat.includes('parking'))    return { fillColor:'#888880', color:'#555550', weight:1.5, fillOpacity:.60 };
    if (cat.includes('student'))    return { fillColor:'#a07850', color:'#705030', weight:1.5, fillOpacity:.72 };
    if (cat.includes('admin'))      return { fillColor:'#7060a0', color:'#504080', weight:1.5, fillOpacity:.72 };
    if (cat.includes('military') || cat.includes('special')) return { fillColor:'#7060a0', color:'#504080', weight:1.5, fillOpacity:.72 };
    return { fillColor:'#c8c3bc', color:'#8a8580', weight:1.5, fillOpacity:.72 };
  }

  // Vision mode
  if (status === 'new' || status === 'new ') {
    if (cat.includes('housing'))    return { fillColor:'#1a5c8e', color:'#0a3c6e', weight:2, fillOpacity:.88 };
    if (cat.includes('parking'))    return { fillColor:'#3a3a5e', color:'#1a1a3e', weight:2, fillOpacity:.85 };
    if (cat.includes('student'))    return { fillColor:'#8e4a1a', color:'#6e2a0a', weight:2, fillOpacity:.88 };
    if (cat.includes('military') || cat.includes('special')) return { fillColor:'#4a1a6e', color:'#2a0a4e', weight:2, fillOpacity:.88 };
    return { fillColor:'#1a3d6e', color:'#0a2240', weight:2, fillOpacity:.90 };
  }
  if (status === 'renovation') {
    return { fillColor:'#4a7ab5', color:'#2a5a95', weight:2, fillOpacity:.82,
             dashArray:'6,3' };
  }
  if (status === 'existing') {
    return { fillColor:'#c8c3bc', color:'#8a8580', weight:1, fillOpacity:.45 };
  }
  return { fillColor:'#888', color:'#555', weight:1, fillOpacity:.5 };
}

// ── Popup ─────────────────────────────────────────────────────────────────────
function makePopup(feature, mode) {
  const p = feature.properties;
  const status = (p.STATUS || '').toLowerCase();
  let badge = 'Existing';
  let badgeBg = '#555';
  if (mode === 'vision') {
    if (status === 'new' || status === 'new ') { badge = 'New Building'; badgeBg = '#1a3d6e'; }
    if (status === 'renovation') { badge = 'Renovation'; badgeBg = '#4a7ab5'; }
    if (status === 'existing') { badge = 'Existing'; badgeBg = '#555'; }
  }
  return `<div style="font-family:'Lato',sans-serif;min-width:200px;max-width:260px;">
    <div style="font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:600;color:#0a2240;margin-bottom:6px;line-height:1.3;">${p.BLDG_NAME}</div>
    <span style="background:${badgeBg};color:#fff;font-size:9px;font-weight:700;padding:2px 8px;border-radius:2px;letter-spacing:.1em;text-transform:uppercase;">${badge}</span>
    <div style="font-size:11px;color:#555;margin-top:6px;line-height:1.5;">
      <strong>Category:</strong> ${p.CATEGORY || '—'}<br>
      ${p.NOTES ? '<em style='color:#888;'>' + p.NOTES + '</em>' : ''}
    </div>
    <div style="font-size:9px;color:#bbb;margin-top:6px;font-style:italic;border-top:1px solid #eee;padding-top:5px;">Georeferenced from campus master plan TIF</div>
  </div>`;
}

// ── Layers ────────────────────────────────────────────────────────────────────
let currentMode = 'existing';

// Existing mode — show only existing + renovation features
const existingFeatures = MP_DATA.features.filter(f => {
  const s = (f.properties.STATUS || '').toLowerCase();
  return s === 'existing' || s === 'renovation';
});

// Add all for existing view with muted style
const existingLayer = L.geoJSON(MP_DATA, {
  style: f => getStyle(f, 'existing'),
  onEachFeature: (f, l) => {
    l.bindPopup(makePopup(f, 'existing'));
    l.on('mouseover', function() { this.setStyle({ weight:3, fillOpacity:0.9 }); });
    l.on('mouseout',  function() { this.setStyle(getStyle(f, 'existing')); });
  }
});

const visionLayer = L.geoJSON(MP_DATA, {
  style: f => getStyle(f, 'vision'),
  onEachFeature: (f, l) => {
    l.bindPopup(makePopup(f, 'vision'));
    l.on('mouseover', function() { this.setStyle({ weight:3, fillOpacity:0.95 }); });
    l.on('mouseout',  function() { this.setStyle(getStyle(f, 'vision')); });
  }
});

existingLayer.addTo(map);
map.fitBounds(existingLayer.getBounds(), { padding:[40,40] });

// ── Toggle ────────────────────────────────────────────────────────────────────
const lbl = document.getElementById('viewLabel');
function flash(txt) {
  lbl.textContent = txt;
  lbl.classList.add('show');
  setTimeout(() => lbl.classList.remove('show'), 1500);
}

function showExisting() {
  if (currentMode === 'existing') return;
  map.removeLayer(visionLayer);
  existingLayer.addTo(map);
  currentMode = 'existing';
  document.getElementById('btnExisting').classList.add('active');
  document.getElementById('btnVision').classList.remove('active');
  flash('Existing Conditions');
}

function showVision() {
  if (currentMode === 'vision') return;
  map.removeLayer(existingLayer);
  visionLayer.addTo(map);
  currentMode = 'vision';
  document.getElementById('btnVision').classList.add('active');
  document.getElementById('btnExisting').classList.remove('active');
  flash('Vision Plan Buildout');
}

// ── Legend ────────────────────────────────────────────────────────────────────
L.control({ position:'bottomright' }).onAdd = function() {
  const d = L.DomUtil.create('div', 'legend');
  d.innerHTML = `
    <h4>Vision Plan Legend</h4>
    <div class="li"><div class="sw" style="background:#1a3d6e;"></div>New Building</div>
    <div class="li"><div class="sw" style="background:#1a5c8e;"></div>New Housing</div>
    <div class="li"><div class="sw" style="background:#8e4a1a;"></div>New Student Services</div>
    <div class="li"><div class="sw" style="background:#4a1a6e;"></div>Military / Specialty Program</div>
    <div class="li"><div class="sw" style="background:#3a3a5e;"></div>New Parking</div>
    <div class="li"><div class="sw" style="background:#4a7ab5;border:1px dashed #2a5a95;"></div>Renovation</div>
    <div class="li"><div class="sw" style="background:#c8c3bc;opacity:0.6;"></div>Existing / Context</div>
    <div class="ln">Footprints georeferenced from<br>campus master plan TIF.<br>Draft · Illustrative only.</div>`;
  return d;
}.addTo(map);
