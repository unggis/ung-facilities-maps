<style>
  :root { --navy:#0a2240; --navy-mid:#0d2d54; --gold:#c9a84c; --gold-light:#e8d49a; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Lato',sans-serif; font-weight:300; background:var(--navy); color:#fff; height:100vh; display:flex; flex-direction:column; overflow:hidden; }
  header { background:var(--navy); border-bottom:2px solid var(--gold); padding:0 24px; height:60px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; z-index:1000; }
  .header-left { display:flex; align-items:center; gap:14px; }
  .wordmark { font-family:'Cormorant Garamond',serif; font-size:13px; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:var(--gold-light); line-height:1.3; }
  .wordmark span { display:block; font-size:10px; font-weight:400; letter-spacing:.18em; color:var(--gold); opacity:.85; }
  .dvdr { width:1px; height:32px; background:var(--gold); opacity:.4; }
  .map-title { font-family:'Cormorant Garamond',serif; font-size:17px; font-weight:400; font-style:italic; color:#fff; letter-spacing:.02em; }
  .badge { background:var(--gold); color:var(--navy); font-size:10px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; padding:3px 10px; border-radius:2px; }
  .toggle-bar { display:flex; height:40px; flex-shrink:0; background:var(--navy-mid); border-bottom:1px solid rgba(201,168,76,.25); align-items:center; justify-content:center; z-index:900; }
  .toggle-label { font-size:10px; font-weight:400; letter-spacing:.12em; text-transform:uppercase; color:rgba(201,168,76,.6); padding-right:16px; white-space:nowrap; font-style:italic; }
  .toggle-btn { height:28px; padding:0 32px; font-family:'Lato',sans-serif; font-size:10px; font-weight:700; letter-spacing:.18em; text-transform:uppercase; border:1px solid rgba(201,168,76,.35); cursor:pointer; transition:all .2s ease; display:flex; align-items:center; gap:8px; background:rgba(255,255,255,.05); color:#9ab0c8; }
  .toggle-btn:first-of-type { border-radius:3px 0 0 3px; }
  .toggle-btn:last-of-type  { border-radius:0 3px 3px 0; border-left:none; }
  .toggle-btn.active { background:var(--navy); color:var(--gold); border-color:var(--gold); box-shadow:0 0 10px rgba(201,168,76,.25); }
  .toggle-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  #viewLabel { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-family:'Cormorant Garamond',serif; font-size:24px; font-style:italic; color:rgba(255,255,255,.9); background:rgba(10,34,64,.78); padding:12px 32px; border-radius:4px; border:1px solid rgba(201,168,76,.5); pointer-events:none; opacity:0; transition:opacity .25s ease; z-index:800; white-space:nowrap; backdrop-filter:blur(4px); }
  #viewLabel.show { opacity:1; }
  #map { flex:1; width:100%; position:relative; }
  .legend { background:rgba(10,34,64,.93); border:1px solid rgba(201,168,76,.4); border-radius:4px; padding:12px 16px; min-width:210px; backdrop-filter:blur(4px); }
  .legend h4 { font-family:'Cormorant Garamond',serif; font-size:13px; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--gold); margin-bottom:10px; padding-bottom:6px; border-bottom:1px solid rgba(201,168,76,.3); }
  .li { display:flex; align-items:center; gap:9px; margin-bottom:6px; font-size:11px; font-weight:300; color:#d0dce8; letter-spacing:.03em; }
  .sw { width:16px; height:12px; border-radius:2px; flex-shrink:0; }
  .ln { margin-top:10px; padding-top:8px; border-top:1px solid rgba(201,168,76,.2); font-size:9.5px; color:rgba(201,168,76,.7); font-style:italic; line-height:1.5; }
  .leaflet-control-attribution { background:rgba(10,34,64,.75)!important; color:rgba(255,255,255,.5)!important; font-size:9px!important; }
  .leaflet-control-attribution a { color:rgba(201,168,76,.8)!important; }
  .leaflet-control-zoom a { background:rgba(10,34,64,.9)!important; color:var(--gold)!important; border-color:rgba(201,168,76,.3)!important; }
</style>
</head>

var map = L.map('map', { center:[34.5295,-83.9868], zoom:16 });
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution:'&copy; OpenStreetMap contributors | John Segars, UNG Facilities GIS',
  maxZoom:20
}).addTo(map);

function getExistingStyle(feature) {
  var cat = (feature.properties.CATEGORY || '').toLowerCase();
  if (cat.indexOf('housing') >= 0)    return { fillColor:'#6a8fb5', color:'#3a5f85', weight:1, fillOpacity:.75 };
  if (cat.indexOf('athletic') >= 0)   return { fillColor:'#7a9e6a', color:'#4a6e3a', weight:1, fillOpacity:.70 };
  if (cat.indexOf('military') >= 0)   return { fillColor:'#7060a0', color:'#504080', weight:1, fillOpacity:.75 };
  if (cat.indexOf('admin') >= 0)      return { fillColor:'#a07850', color:'#705030', weight:1, fillOpacity:.75 };
  if (cat.indexOf('support') >= 0)    return { fillColor:'#888880', color:'#555550', weight:1, fillOpacity:.65 };
  return { fillColor:'#c8c3bc', color:'#8a8580', weight:1, fillOpacity:.75 };
}

function getVisionStyle(feature) {
  var status = (feature.properties.STATUS || '').toLowerCase().trim();
  var cat    = (feature.properties.CATEGORY || '').toLowerCase();
  if (status === 'new') {
    if (cat.indexOf('housing') >= 0)  return { fillColor:'#1a5c8e', color:'#0a3c6e', weight:2, fillOpacity:.90 };
    if (cat.indexOf('parking') >= 0)  return { fillColor:'#3a3a5e', color:'#1a1a3e', weight:2, fillOpacity:.88 };
    if (cat.indexOf('student') >= 0)  return { fillColor:'#8e4a1a', color:'#6e2a0a', weight:2, fillOpacity:.90 };
    if (cat.indexOf('military') >= 0) return { fillColor:'#4a1a6e', color:'#2a0a4e', weight:2, fillOpacity:.90 };
    return { fillColor:'#1a3d6e', color:'#0a2240', weight:2, fillOpacity:.90 };
  }
  if (status === 'renovation') return { fillColor:'#4a7ab5', color:'#2a5a95', weight:2.5, fillOpacity:.85, dashArray:'6,3' };
  return { fillColor:'#c8c3bc', color:'#8a8580', weight:1, fillOpacity:.45 };
}

function existingPopup(p) {
  var html = '<div style="font-family:Lato,sans-serif;min-width:180px;">';
  html += '<div style="font-size:15px;font-weight:600;color:#0a2240;margin-bottom:5px;">' + (p.Building || '&mdash;') + '</div>';
  html += '<div style="font-size:11px;color:#555;line-height:1.6;">';
  if (p.BUILDING_CODE) html += '<strong>Code:</strong> ' + p.BUILDING_CODE + '<br>';
  if (p.sqft)          html += '<strong>Sq Ft:</strong> ' + Number(p.sqft).toLocaleString() + '<br>';
  if (p.YR_CONST)      html += '<strong>Year Built:</strong> ' + p.YR_CONST + '<br>';
  if (p.CATEGORY)      html += '<strong>Type:</strong> ' + p.CATEGORY + '<br>';
  html += '</div></div>';
  return html;
}

function visionPopup(p) {
  var status = (p.STATUS || '').toLowerCase().trim();
  var badge = 'Existing', bg = '#555';
  if (status === 'new')        { badge = 'New Building'; bg = '#1a3d6e'; }
  if (status === 'renovation') { badge = 'Renovation';   bg = '#4a7ab5'; }
  var html = '<div style="font-family:Lato,sans-serif;min-width:200px;">';
  html += '<div style="font-size:15px;font-weight:600;color:#0a2240;margin-bottom:6px;">' + (p.BLDG_NAME || '&mdash;') + '</div>';
  html += '<span style="background:' + bg + ';color:#fff;font-size:9px;font-weight:700;padding:2px 8px;border-radius:2px;letter-spacing:.1em;text-transform:uppercase;">' + badge + '</span>';
  html += '<div style="font-size:11px;color:#555;margin-top:6px;"><strong>Category:</strong> ' + (p.CATEGORY || '&mdash;') + '</div>';
  html += '<div style="font-size:9px;color:#bbb;margin-top:6px;font-style:italic;border-top:1px solid #eee;padding-top:5px;">Georeferenced from campus master plan</div>';
  html += '</div>';
  return html;
}

// Build layers - none added to map yet except existingLayer
var existingLayer = L.geoJSON(EX_DATA, {
  style: getExistingStyle,
  onEachFeature: function(f, l) {
    l.bindPopup(existingPopup(f.properties));
    l.on('mouseover', function() { this.setStyle({ weight:2.5, fillOpacity:.95 }); });
    l.on('mouseout',  function() { this.setStyle(getExistingStyle(f)); });
  }
});

// Muted context layer for vision tab background
var contextLayer = L.geoJSON(EX_DATA, {
  style: function() {
    return { fillColor:'#b8b4ae', color:'#8a8580', weight:0.5, fillOpacity:.30 };
  },
  onEachFeature: function(f, l) {
    l.bindPopup('<div style="font-family:Lato,sans-serif;font-size:13px;color:#333;"><strong>' + (f.properties.Building || '&mdash;') + '</strong><div style="font-size:11px;color:#888;margin-top:3px;">Existing building</div></div>');
  }
});

var visionLayer = L.geoJSON(MP_DATA, {
  style: getVisionStyle,
  onEachFeature: function(f, l) {
    l.bindPopup(visionPopup(f.properties));
    l.on('mouseover', function() { this.setStyle({ weight:3, fillOpacity:.98 }); });
    l.on('mouseout',  function() { this.setStyle(getVisionStyle(f)); });
  }
});

existingLayer.addTo(map);
// map.fitBounds(existingLayer.getBounds(), { padding:[40,40] });
map.setView([34.5300, -83.9872], 17);
var currentMode = 'existing';

var lbl = document.getElementById('viewLabel');
function flash(txt) {
  lbl.textContent = txt;
  lbl.classList.add('show');
  setTimeout(function() { lbl.classList.remove('show'); }, 1500);
}

function showExisting() {
  if (currentMode === 'existing') return;
  if (map.hasLayer(visionLayer))   map.removeLayer(visionLayer);
  if (map.hasLayer(contextLayer))  map.removeLayer(contextLayer);
  existingLayer.addTo(map);
  currentMode = 'existing';
  document.getElementById('btnExisting').classList.add('active');
  document.getElementById('btnVision').classList.remove('active');
  flash('Existing Conditions');
}

function showVision() {
  if (currentMode === 'vision') return;
  if (map.hasLayer(existingLayer)) map.removeLayer(existingLayer);
  contextLayer.addTo(map);
  visionLayer.addTo(map);
  currentMode = 'vision';
  document.getElementById('btnVision').classList.add('active');
  document.getElementById('btnExisting').classList.remove('active');
  flash('Vision Plan Buildout');
}

    '<div class="li"><div class="sw" style="background:#a07850;"></div>Administration</div>' +
    '<div class="li"><div class="sw" style="background:#888880;"></div>Support / Facilities</div>' +
    '<div style="margin-top:8px;padding-top:8px;border-top:1px solid rgba(201,168,76,.3);">' +
    '<div class="li"><div class="sw" style="background:#1a3d6e;"></div>New Building (Vision)</div>' +
    '<div class="li"><div class="sw" style="background:#1a5c8e;"></div>New Housing (Vision)</div>' +
    '<div class="li"><div class="sw" style="background:#4a7ab5;border:1px dashed #2a5a95;"></div>Renovation (Vision)</div>' +
    '<div class="li"><div class="sw" style="background:#b8b4ae;opacity:.5;"></div>Existing Context (Vision)</div>' +
    '</div>' +
    '<div class="ln">Existing: UNG Enterprise GDB (143 bldgs)<br>Vision: Georeferenced master plan TIF<br>Draft &middot; Illustrative only.</div>';
  return d;
}.addTo(map);
