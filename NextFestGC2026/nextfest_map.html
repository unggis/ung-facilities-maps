<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NextFest Gainesville 2026</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/esri-leaflet@3.0.10/dist/esri-leaflet.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  #map { height: 100vh; width: 100%; }

  .building-label {
    background: transparent;
    border: none;
    box-shadow: none;
    color: #003057;
    font-size: 11px;
    font-weight: 700;
    font-family: Arial, sans-serif;
    white-space: nowrap;
    pointer-events: none;
  }

  .custom-popup .leaflet-popup-content-wrapper {
    border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    padding: 0; overflow: hidden;
  }
  .custom-popup .leaflet-popup-content { margin: 0; width: 260px !important; }
  .popup-header-mts { background: #003057; color: #fff; padding: 12px 14px 10px; }
  .popup-header-poi { background: #CBA052; color: #fff; padding: 12px 14px 10px; }
  .popup-stop-mts { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #CBA052; font-weight: 600; margin-bottom: 4px; }
  .popup-stop-poi { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #003057; font-weight: 600; margin-bottom: 4px; }
  .popup-title { font-size: 15px; font-weight: 700; line-height: 1.2; }
  .popup-body { padding: 10px 14px 12px; font-size: 13px; color: #333; line-height: 1.5; }

  .mts-pin {
    width: 32px; height: 32px; border-radius: 50% 50% 50% 0;
    background: #003057; border: 2px solid #CBA052;
    transform: rotate(-45deg); display: flex; align-items: center; justify-content: center;
  }
  .mts-pin span { transform: rotate(45deg); color: #CBA052; font-weight: 700; font-size: 13px; font-family: Arial, sans-serif; display: block; margin-left: 1px; margin-top: 1px; }

  .poi-pin {
    width: 28px; height: 28px; border-radius: 50% 50% 50% 0;
    background: #CBA052; border: 2px solid #003057;
    transform: rotate(-45deg); display: flex; align-items: center; justify-content: center;
  }
  .poi-pin span { transform: rotate(45deg); color: #003057; font-weight: 700; font-size: 11px; font-family: Arial, sans-serif; display: block; margin-left: 1px; margin-top: 1px; }

  .bldg-popup-header {
    background: #003057; color: #fff;
    padding: 10px 14px; font-size: 14px; font-weight: 700; font-family: Arial, sans-serif;
  }
  .bldg-table {
    width: 100%; border-collapse: collapse;
    font-size: 12px; font-family: Arial, sans-serif;
  }
  .bldg-table tr:nth-child(even) { background: #f5f5f5; }
  .bldg-table td { padding: 5px 10px; color: #333; }
  .bldg-table td.bl { font-weight: 700; color: #003057; white-space: nowrap; width: 80px; }
</style>
</head>
<body>
<div id="map"></div>
<script>
  const map = L.map('map', {
    center: [34.235461, -83.867408],
    zoom: 17,
    minZoom: 15,
    maxZoom: 19,
    zoomControl: true
  });

  // Pane for buildings — below markers
  map.createPane('buildings');
  map.getPane('buildings').style.zIndex = 400;

  // CartoDB no-labels base
  L.tileLayer('https://{s}.basemaps.cartocdn.com/light_nolabels/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 20
  }).addTo(map);

  // UNG Building Footprints — Gainesville only (campus field = 'Gainesville')
  L.esri.featureLayer({
    url: 'https://services3.arcgis.com/4ADpogqF2B4hadEB/arcgis/rest/services/Building_Footprints_2_view/FeatureServer/5',
    pane: 'buildings',
    where: "Campus = 3",
    style: {
      color: '#003057',
      weight: 1.5,
      fillColor: '#CBA052',
      fillOpacity: 0.35
    },
    onEachFeature: function(feature, layer) {
      var p = feature.properties;
      var name = p.Building || 'Building';

      // Tooltip on zoom 19
      if (name) {
        layer.bindTooltip(name, {
          permanent: true,
          direction: 'center',
          className: 'building-label'
        });
        function updateLabel() {
          if (map.getZoom() >= 19) { layer.openTooltip(); } else { layer.closeTooltip(); }
        }
        map.on('zoomend', updateLabel);
        updateLabel();
      }

      // Building type lookup
      var buildingTypes = { 0: 'Academic', 3: 'Administration', 2: 'Athletics & Recreation', 1: 'Residential', 4: 'Support', 5: 'Other' };
      var typeLabel = buildingTypes[p.BuildingType] || '';

      // Click popup
      layer.on('click', function() {
        var rows = '';
        if (typeLabel)  rows += '<tr><td class="bl">Type</td><td>' + typeLabel + '</td></tr>';
        if (p.sqft)     rows += '<tr><td class="bl">Sq Ft</td><td>' + p.sqft.toLocaleString() + '</td></tr>';
        rows += '<tr><td class="bl">ADA</td><td>' + (p.ADA_ACCES === 1 ? 'Yes' : 'No') + '</td></tr>';

        layer.bindPopup(
          '<div class="bldg-popup-header">' + name + '</div>' +
          '<table class="bldg-table">' + rows + '</table>',
          { maxWidth: 260 }
        ).openPopup();
      });
    }
  }).addTo(map);

  // ── MARKER FACTORIES ──
  function mtsIcon(n) {
    return L.divIcon({
      className: '',
      html: `<div class="mts-pin"><span>${n}</span></div>`,
      iconSize: [32, 32], iconAnchor: [16, 32], popupAnchor: [0, -34]
    });
  }

  function poiIcon(initial) {
    return L.divIcon({
      className: '',
      html: `<div class="poi-pin"><span>${initial}</span></div>`,
      iconSize: [28, 28], iconAnchor: [14, 28], popupAnchor: [0, -30]
    });
  }

  // ── MAIN TOUR STOPS ──
  const mtsStops = [
    {
      n: 1,
      lat: 34.234847,
      lng: -83.867550,
      title: "Orientation — Student Center",
      img: "imgs/student_center.jpg",
      body: "Welcome to NextFest! Start your tour here at the Student Center. Pick up a program, get your bearings, and head out to explore everything the Gainesville campus has to offer. [Update with CE content]"
    }
    // Add MTS stops here: { n: 2, lat: XX, lng: XX, title: "...", img: "imgs/filename.jpg", body: "..." }
  ];

  // ── POINTS OF INTEREST ──
  const poiStops = [
    {
      initial: "A",
      category: "Arts",
      lat: 34.235974,
      lng: -83.864635,
      title: "The Mural",
      img: "imgs/mural.jpg",
      body: "This vibrant mural captures the cultural spirit of UNG and the Gainesville community — and the bold vision behind UNG's fine arts programs. A must-see for visitors drawn to the visual arts. [Update with CE content]"
    }
    // Add POI stops here: { initial: "F", category: "Food", lat: XX, lng: XX, title: "...", img: "imgs/filename.jpg", body: "..." }
  ];

  mtsStops.forEach(stop => {
    L.marker([stop.lat, stop.lng], { icon: mtsIcon(stop.n) })
      .addTo(map)
      .bindPopup(`
        <div class="popup-header-mts">
          <div class="popup-stop-mts">Stop ${stop.n}</div>
          <div class="popup-title">${stop.title}</div>
        </div>
        ${stop.img ? `<img src="${stop.img}" style="width:100%;height:120px;object-fit:cover;display:block;">` : ''}
        <div class="popup-body">${stop.body}</div>
      `, { className: 'custom-popup', maxWidth: 280 });
  });

  poiStops.forEach(stop => {
    L.marker([stop.lat, stop.lng], { icon: poiIcon(stop.initial) })
      .addTo(map)
      .bindPopup(`
        <div class="popup-header-poi">
          <div class="popup-stop-poi">${stop.category}</div>
          <div class="popup-title">${stop.title}</div>
        </div>
        ${stop.img ? `<img src="${stop.img}" style="width:100%;height:120px;object-fit:cover;display:block;">` : ''}
        <div class="popup-body">${stop.body}</div>
      `, { className: 'custom-popup', maxWidth: 280 });
  });

</script>
</body>
</html>
