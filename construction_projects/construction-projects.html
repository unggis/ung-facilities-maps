<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>UNG Construction Projects</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/esri-leaflet@3.0.10/dist/esri-leaflet.js"></script>
  <style>
    * { box-sizing: border-box; }

    body { margin: 0; padding: 0; font-family: Arial, sans-serif; }

    /* ── Header bar — matches life safety page ── */
    #page-header {
      background: #003366;
      color: #ffffff;
      text-align: center;
      padding: 8px 12px;
      font-size: 14px;
      font-weight: bold;
      border-radius: 6px 6px 0 0;
    }

    #ungmap {
      height: 430px;
      width: 100%;
      border-radius: 0 0 6px 6px;
    }

    /* ── Building tooltip — matches life safety page ── */
    .building-tooltip {
      background: #003366;
      color: #ffffff;
      border: none;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: bold;
    }
    .building-tooltip::before { border-top-color: #003366; }

    /* ── Popup wrapper ── */
    .leaflet-popup-content-wrapper {
      border-radius: 6px;
      border-top: 4px solid #C8952A;
      font-size: 12px;
      min-width: 260px;
      max-width: 340px;
    }
    .popup-building {
      font-weight: bold;
      font-size: 14px;
      color: #003366;
      margin-bottom: 2px;
    }
    .popup-campus {
      font-size: 11px;
      color: #666;
      padding-bottom: 6px;
      margin-bottom: 8px;
      border-bottom: 1px solid #e0e0e0;
    }
    .popup-count {
      font-size: 11px;
      color: #555;
      margin-bottom: 8px;
    }

    /* ── Accordion ── */
    .popup-accordion {
      border: 1px solid #ddd;
      border-radius: 4px;
      overflow: hidden;
    }
    .popup-accordion-row {
      border-bottom: 1px solid #ddd;
    }
    .popup-accordion-row:last-child { border-bottom: none; }

    .popup-accordion-header {
      display: flex;
      align-items: center;
      padding: 7px 10px;
      background: #f5f5f5;
      cursor: pointer;
      user-select: none;
      gap: 6px;
    }
    .popup-accordion-header:hover { background: #eaeaea; }
    .popup-accordion-header.open {
      background: #003366;
      color: #fff;
    }
    .popup-accordion-title {
      font-weight: bold;
      font-size: 12px;
      flex: 1;
    }
    .popup-accordion-status {
      padding: 1px 7px;
      border-radius: 10px;
      font-size: 10px;
      font-weight: bold;
      color: #fff;
      background: #e06000;
      white-space: nowrap;
    }
    .popup-accordion-header.open .popup-accordion-status {
      background: rgba(255,255,255,0.22);
    }
    .popup-accordion-chevron {
      font-size: 10px;
      color: #aaa;
      transition: transform 0.2s;
      flex-shrink: 0;
    }
    .popup-accordion-header.open .popup-accordion-chevron {
      transform: rotate(180deg);
      color: #C8952A;
    }

    /* Body hidden by default; JS toggles .open */
    .popup-accordion-body {
      display: none;
      padding: 8px 10px;
      background: #fff;
      border-top: 1px solid #eee;
    }
    .popup-accordion-body.open { display: block; }

    .popup-row {
      display: flex;
      gap: 4px;
      margin: 3px 0;
      font-size: 11px;
    }
    .popup-label {
      font-weight: bold;
      color: #555;
      white-space: nowrap;
      min-width: 56px;
    }
    .popup-loading {
      color: #888;
      font-style: italic;
      font-size: 11px;
    }
    .popup-none {
      color: #999;
      font-style: italic;
      font-size: 11px;
    }
  </style>
</head>
<body>

  <div id="page-header">UNG Campus Construction Projects</div>
  <div id="ungmap"></div>

  <script>

    // ── Service endpoints ──
    var PROJECT_AREAS_URL  = 'https://services3.arcgis.com/4ADpogqF2B4hadEB/arcgis/rest/services/Construction_Project_Areas/FeatureServer/0';
    var PROJECTS_TABLE_URL = 'https://services3.arcgis.com/4ADpogqF2B4hadEB/arcgis/rest/services/Construction_Project_Areas/FeatureServer/8';
    var BUILDINGS_URL      = 'https://services3.arcgis.com/4ADpogqF2B4hadEB/arcgis/rest/services/Building_Footprints_2_view/FeatureServer/5';

    // ── Map init ──
    var map = L.map('ungmap', { maxZoom: 21 }).setView([34.53, -83.98], 15);

    map.createPane('buildings');
    map.getPane('buildings').style.zIndex = 400;

    map.createPane('construction');
    map.getPane('construction').style.zIndex = 450;

    // ── Basemaps ──
    var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '&copy; OpenStreetMap contributors | John Segars, UNG Facilities GIS',
      maxZoom: 19
    });
    var esriImagery = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
      attribution: 'Tiles &copy; Esri &mdash; Source: Esri, Maxar, GeoEye, Earthstar Geographics',
      maxZoom: 21
    });
    var esriLabels = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}', {
      attribution: 'Labels &copy; Esri',
      maxZoom: 21
    });

    osm.addTo(map);
    L.control.layers(
      { 'Street Map': osm, 'Satellite': L.layerGroup([esriImagery, esriLabels]) },
      null,
      { position: 'topright' }
    ).addTo(map);

    // ── Background building footprints (spatial context only) ──
    L.esri.featureLayer({
      url: BUILDINGS_URL,
      pane: 'buildings',
      style: {
        color: '#003366',
        weight: 1.5,
        fillColor: '#C8952A',
        fillOpacity: 0.4
      },
      onEachFeature: function(feature, layer) {
        var props = feature.properties;
        // 'Building' = building name field; 'name' = display/domain field as fallback
        var label = props.Building || props.name || 'Building';
        layer.bindTooltip(label, {
          permanent: false,
          sticky: true,
          direction: 'top',
          className: 'building-tooltip'
        });
      }
    }).addTo(map);

    // ── Build a detail row ──
    function detailRow(label, value) {
      return '<div class="popup-row"><span class="popup-label">' + label + ':</span><span>' + value + '</span></div>';
    }

    // ── Query Projects_Table by Area_ID, render collapsible accordion ──
    function queryProjects(areaId, buildingName, campusName, popup) {
      var queryUrl = PROJECTS_TABLE_URL
        + '/query?where=Area_ID%3D' + encodeURIComponent(areaId)
        + '&outFields=Project,Location,Vendor,Status,Notes,Cost,PO,Acct'
        + '&f=json';

      fetch(queryUrl)
        .then(function(r) { return r.json(); })
        .then(function(data) {
          var features = data.features || [];

          var html = '<div class="popup-building">' + (buildingName || 'Project Area') + '</div>';
          if (campusName) html += '<div class="popup-campus">' + campusName + '</div>';

          if (features.length === 0) {
            html += '<div class="popup-none">No project records found.</div>';
            popup.setContent(html);
            return;
          }

          // Single project — expand immediately, no accordion needed
          if (features.length === 1) {
            var p = features[0].attributes;
            if (p.Project) html += '<div style="font-weight:bold;color:#003366;margin-bottom:6px;">' + p.Project + '</div>';
            if (p.Status)  html += detailRow('Status', '<span style="background:#e06000;color:#fff;border-radius:10px;padding:1px 7px;font-size:10px;font-weight:bold;">' + p.Status + '</span>');
            if (p.Location) html += detailRow('Location', p.Location);
            if (p.Vendor)   html += detailRow('Vendor', p.Vendor);
            if (p.Cost !== null && p.Cost !== undefined && p.Cost !== '')
              html += detailRow('Cost', '$' + Number(p.Cost).toLocaleString('en-US', { maximumFractionDigits: 0 }));
            if (p.PO)    html += detailRow('PO', p.PO);
            if (p.Acct)  html += detailRow('Acct', p.Acct);
            if (p.Notes) html += detailRow('Notes', p.Notes);
            popup.setContent(html);
            return;
          }

          // Multiple projects — accordion
          var count = features.length;
          html += '<div class="popup-count">' + count + ' projects — click to expand</div>';
          html += '<div class="popup-accordion">';

          features.forEach(function(f, i) {
            var p = f.attributes;
            var title = p.Project || ('Project ' + (i + 1));
            var status = p.Status || '';

            // Build body content
            var body = '';
            if (p.Status)   body += detailRow('Status', '<span style="background:#e06000;color:#fff;border-radius:10px;padding:1px 7px;font-size:10px;font-weight:bold;">' + p.Status + '</span>');
            if (p.Location) body += detailRow('Location', p.Location);
            if (p.Vendor)   body += detailRow('Vendor', p.Vendor);
            if (p.Cost !== null && p.Cost !== undefined && p.Cost !== '')
              body += detailRow('Cost', '$' + Number(p.Cost).toLocaleString('en-US', { maximumFractionDigits: 0 }));
            if (p.PO)    body += detailRow('PO', p.PO);
            if (p.Acct)  body += detailRow('Acct', p.Acct);
            if (p.Notes) body += detailRow('Notes', p.Notes);
            if (!body)   body  = '<div class="popup-none">No additional details.</div>';

            html += '<div class="popup-accordion-row">'
              + '<div class="popup-accordion-header" onclick="toggleAccordion(this)" data-idx="' + i + '">'
              + '<span class="popup-accordion-title">' + title + '</span>'
              + (status ? '<span class="popup-accordion-status">' + status + '</span>' : '')
              + '<span class="popup-accordion-chevron">&#9660;</span>'
              + '</div>'
              + '<div class="popup-accordion-body" id="acc-body-' + i + '">' + body + '</div>'
              + '</div>';
          });

          html += '</div>'; // .popup-accordion
          popup.setContent(html);
        })
        .catch(function() {
          popup.setContent('<div style="color:red;font-size:12px;">Error loading project details.</div>');
        });
    }

    // ── Accordion toggle (global so inline onclick can reach it) ──
    function toggleAccordion(header) {
      var isOpen = header.classList.contains('open');
      // Close all in this popup
      var allHeaders = header.closest('.popup-accordion').querySelectorAll('.popup-accordion-header');
      var allBodies  = header.closest('.popup-accordion').querySelectorAll('.popup-accordion-body');
      allHeaders.forEach(function(h) { h.classList.remove('open'); });
      allBodies.forEach(function(b)  { b.classList.remove('open'); });
      // Open clicked one (unless it was already open — toggle off)
      if (!isOpen) {
        header.classList.add('open');
        var idx = header.getAttribute('data-idx');
        var body = document.getElementById('acc-body-' + idx);
        if (body) body.classList.add('open');
        // Refit popup after DOM change
        setTimeout(function() { header.closest('.leaflet-popup') && map.invalidateSize(); }, 50);
      }
    }

    // ── Construction Project Areas (polygons) ──
    var constructionLayer = L.esri.featureLayer({
      url: PROJECT_AREAS_URL,
      pane: 'construction',
      style: {
        color: '#e06000',
        weight: 2.5,
        fillColor: '#f59a45',
        fillOpacity: 0.55,
        dashArray: '6 3'
      },
      onEachFeature: function(feature, layer) {
        var props = feature.properties;
        var count = props.Project_Count || 0;

        // Tooltip with project count badge
        var tooltipHtml = '<strong>' + (props.Building_Name || 'Project Area') + '</strong>'
          + (count
              ? ' &nbsp;<span style="background:#e06000;color:#fff;border-radius:9px;padding:1px 6px;font-size:11px;">'
                + count + ' project' + (count !== 1 ? 's' : '') + '</span>'
              : '');

        layer.bindTooltip(tooltipHtml, {
          permanent: false,
          sticky: true,
          direction: 'top',
          className: 'building-tooltip'
        });

        // Click: open popup with loading state, then fetch related projects
        layer.on('click', function() {
          var center = layer.getBounds ? layer.getBounds().getCenter() : layer.getLatLng();
          var popup = L.popup({ maxWidth: 340 })
            .setLatLng(center)
            .setContent('<div class="popup-loading">Loading project details\u2026</div>')
            .openOn(map);

          queryProjects(props.Area_ID, props.Building_Name, props.Campus_Name, popup);
        });

        // Hover highlight
        layer.on('mouseover', function() { layer.setStyle({ fillOpacity: 0.8, weight: 3.5 }); });
        layer.on('mouseout',  function() { constructionLayer.resetStyle(layer); });
      }
    }).addTo(map);

    // ── Legend ──
    var legend = L.control({ position: 'bottomright' });
    legend.onAdd = function() {
      var div = L.DomUtil.create('div');
      div.style.cssText = 'background:white;padding:10px;border-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,0.3);line-height:1.9;font-size:12px;font-family:Arial;';
      div.innerHTML =
        '<strong style="display:block;margin-bottom:6px;">Construction</strong>'
        + '<span style="display:inline-block;width:28px;height:14px;background:#f59a45;border:2.5px dashed #e06000;margin-right:6px;vertical-align:middle;"></span> Project Area<br><br>'
        + '<strong style="display:block;margin-bottom:6px;">Buildings</strong>'
        + '<span style="display:inline-block;width:14px;height:14px;background:#C8952A;border:2px solid #003366;margin-right:6px;vertical-align:middle;"></span> Building Footprint';
      return div;
    };
    legend.addTo(map);

    // ── Campus Bookmarks ──
    var campuses = {
      'Blue Ridge':  { latlng: [34.88866, -84.29174], zoom: 18 },
      'Cumming':     { latlng: [34.22394, -84.10806], zoom: 17 },
      'Dahlonega':   { latlng: [34.5297,  -83.9849],  zoom: 15 },
      'Gainesville': { latlng: [34.23474, -83.86722], zoom: 16 },
      'Oconee':      { latlng: [33.86621, -83.42595], zoom: 17 }
    };

    var bookmarkControl = L.control({ position: 'topleft' });
    bookmarkControl.onAdd = function() {
      var div = L.DomUtil.create('div');
      div.style.cssText = 'background:white;padding:8px;border-radius:6px;box-shadow:0 1px 4px rgba(0,0,0,0.3);font-size:12px;font-family:Arial;';

      var label = document.createElement('strong');
      label.textContent = 'Campus';
      label.style.cssText = 'display:block;margin-bottom:6px;';
      div.appendChild(label);

      Object.keys(campuses).forEach(function(name) {
        var btn = document.createElement('button');
        btn.textContent = name;
        btn.style.cssText = 'display:block;width:100%;margin-bottom:4px;padding:4px 8px;background:#003366;color:#fff;border:none;border-radius:3px;cursor:pointer;text-align:left;font-size:12px;';
        btn.onmouseover = function() { this.style.background = '#C8952A'; };
        btn.onmouseout  = function() { this.style.background = '#003366'; };
        btn.onclick = function() { map.setView(campuses[name].latlng, campuses[name].zoom); };
        div.appendChild(btn);
      });

      return div;
    };
    bookmarkControl.addTo(map);

  </script>
</body>
</html>
